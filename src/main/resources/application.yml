spring:
  application:
    name: spring-rag
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://host.docker.internal:8888}"
  cloud:
    config:
      fail-fast: false
      retry:
        max-attempts: 6
        initial-interval: 2000
        max-interval: 3000

# Fallback defaults — used only if config server is unreachable
server:
  port: 8080
  error:
    include-message: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: http://host.docker.internal:4318/v1/metrics
        step: 30s
    tracing:
      endpoint: http://host.docker.internal:4318/v1/traces

rag:
  ollama:
    base-url: http://host.docker.internal:11434
    embedding-model: nomic-embed-text
    chat-model: llama3.2:3b
    rerank-model: ""
    timeout-seconds: 60
  weaviate:
    base-url: http://host.docker.internal:8383
    collection: PyAgentRAGDocuments
    text-field: text
    api-key: ""
  retrieval:
    top-k: 5
    hybrid-alpha: 0.5
    rerank-top-k: 3
    rerank-enabled: true
    rerank-preview-chars: 150
  chunking:
    sentences-per-chunk: 3
    token-overlap: 8

guardrails:
  api-key: changeme
  allowed-origins: "http://localhost:8282,http://localhost:3000"
  rate-limit:
    requests-per-minute: 30
  input:
    max-query-length: 1000
    max-context-length: 50000
