server:
  port: 8080
  error:
    include-message: always
    include-exception: true
  tomcat:
    accesslog:
      enabled: true
      directory: /tmp
      prefix: spring-rag-access
      suffix: .log
      pattern: '%t "%r" %s %b %D ms'

logging:
  level:
    com.example.rag: DEBUG
    org.springframework.web: DEBUG

rag:
  ollama:
    base-url: http://host.docker.internal:11434
    model: llama3.2:3b
  weaviate:
    base-url: http://host.docker.internal:8383
    collection: PyAgentRAGDocuments
    text-field: text
    api-key: 18b2272a7b66b3f213e72652356c1cf0b21d5c3f4081fe224756c12ed49f6fd5
  retrieval:
    top-k: 10
    hybrid-alpha: 0.5
    rerank-top-k: 5
  chunking:
    sentences-per-chunk: 3
    token-overlap: 8
