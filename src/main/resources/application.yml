spring:
  application:
    name: spring-rag

server:
  port: 8080
  error:
    include-message: never
    include-exception: false
  tomcat:
    accesslog:
      enabled: true
      directory: /tmp
      prefix: spring-rag-access
      suffix: .log
      pattern: '%t "%r" %s %b %D ms'
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      probability: ${OTEL_SAMPLE_RATE:1.0}
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://host.docker.internal:4318}/v1/metrics
        step: 30s
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://host.docker.internal:4318}/v1/traces

rag:
  ollama:
    base-url: ${RAG_OLLAMA_BASE_URL:http://host.docker.internal:11434}
    embedding-model: ${RAG_OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    chat-model: ${RAG_OLLAMA_CHAT_MODEL:llama3.2:3b}
    timeout-seconds: ${RAG_OLLAMA_TIMEOUT_SECONDS:60}
  weaviate:
    base-url: ${RAG_WEAVIATE_BASE_URL:http://host.docker.internal:8383}
    collection: ${RAG_WEAVIATE_COLLECTION:PyAgentRAGDocuments}
    text-field: text
    api-key: ${WEAVIATE_API_KEY:}
  retrieval:
    top-k: 10
    hybrid-alpha: 0.5
    rerank-top-k: 5
  chunking:
    sentences-per-chunk: 3
    token-overlap: 8

guardrails:
  api-key: ${API_KEY:changeme}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:8282,http://localhost:3000}
  rate-limit:
    requests-per-minute: ${RATE_LIMIT_RPM:30}
  input:
    max-query-length: ${MAX_QUERY_LENGTH:1000}
    max-context-length: ${MAX_CONTEXT_LENGTH:50000}
