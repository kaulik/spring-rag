# Test profile – disable config server client and provide safe no-op values
# so the context loads without a live Ollama / Weaviate / config-server instance.
spring:
  cloud:
    config:
      enabled: false

rag:
  ollama:
    base-url: http://localhost:11434
    embedding-model: nomic-embed-text
    chat-model: llama3.2:3b
  weaviate:
    base-url: http://localhost:8383
    collection: testCollection
    text-field: text
  retrieval:
    top-k: 10
    hybrid-alpha: 0.5
    rerank-top-k: 5
  chunking:
    sentences-per-chunk: 3
    token-overlap: 20
